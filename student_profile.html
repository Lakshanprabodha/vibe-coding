<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Profile Card</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --card-bg: #ffffff;
            --text-main: #2d3436;
            --text-muted: #636e72;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--primary-gradient);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .profile-card {
            background: var(--card-bg);
            width: 100%;
            max-width: 350px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            text-align: center;
            transition: transform 0.3s ease;
        }

        .profile-card:hover {
            transform: translateY(-5px);
        }

        .image-container {
            padding: 40px 0 20px;
            background: #f8f9fa;
            position: relative;
        }

        .profile-img-wrapper {
            width: 120px;
            height: 120px;
            background: #dfe6e9;
            border-radius: 50%;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 4px solid #fff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            cursor: pointer;
            overflow: hidden;
            position: relative;
        }

        .profile-img-wrapper:hover::after {
            content: 'Change';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.5);
            color: white;
            font-size: 0.7rem;
            padding: 2px 0;
        }

        .profile-img-wrapper svg {
            width: 60px;
            height: 60px;
            fill: #b2bec3;
        }

        .profile-img-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        #fileInput {
            display: none;
        }

        .info-section {
            padding: 20px 30px 40px;
        }

        .name {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 5px;
        }

        .stream {
            font-size: 0.9rem;
            font-weight: 600;
            color: #6c5ce7;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
        }

        .bio {
            font-size: 0.95rem;
            color: var(--text-muted);
            line-height: 1.6;
        }

        .hint {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 10px;
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <div class="image-container">
            <input type="file" id="fileInput" accept="image/*">
            <div class="profile-img-wrapper" onclick="triggerUpload()">
                <svg id="placeholder" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                </svg>
                <img id="profileImage" src="" alt="Profile">
            </div>
            <p class="hint">Click circle to upload photo</p>
        </div>
        <div class="info-section">
            <h1 class="name">Alex Johnson</h1>
            <p class="stream">Computer Science & AI</p>
            <p class="bio">Passionate about building intuitive user interfaces and exploring the potential of machine learning to solve real-world problems.</p>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const profileImage = document.getElementById('profileImage');
        const placeholder = document.getElementById('placeholder');

        function triggerUpload() {
            fileInput.click();
        }

        fileInput.onchange = function() {
            const file = fileInput.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    profileImage.src = e.target.result;
                    profileImage.style.display = 'block';
                    placeholder.style.display = 'none';
                }
                reader.readAsDataURL(file);
            }
        };
    </script>
</body>
</html>
